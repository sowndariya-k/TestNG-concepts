# Configuration name
name = PropertiesConfig

appenders = console, logfile, htmlfile

# Console
appender.console.type = Console
appender.console.name = console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %highlight{[%-5level]}{ERROR=red, WARN=yellow, INFO=green, DEBUG=blue} %d{yyyy-MM-dd HH:mm:ss} [%t] %c{1} - %msg%n

# Text Log File
appender.logfile.type = File
appender.logfile.name = logfile
appender.logfile.fileName = logs/logs.log
appender.logfile.layout.type = PatternLayout
appender.logfile.layout.pattern = [%-5level] %d{yyyy-MM-dd HH:mm:ss} [%t] %c{1} - %msg%n

appender.htmlfile.type = File
appender.htmlfile.name = htmlfile
appender.htmlfile.fileName = logs/logs.html
appender.htmlfile.layout.type = HtmlLayout
appender.htmlfile.append = false

# Root logger
rootLogger.level = debug
rootLogger.appenderRefs = console, logfile, htmlfile
rootLogger.appenderRef.console.ref = console
rootLogger.appenderRef.logfile.ref = logfile
rootLogger.appenderRef.htmlfile.ref = htmlfile